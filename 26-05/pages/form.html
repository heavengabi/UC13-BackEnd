<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form class="formulario">
        <h1>Cadastro</h1>

        <div class="campo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite seu nome">
        </div>

        <div class="campo">
            <label for="cep">CEP</label>
            <input type="text" id="cep" placeholder="Digite seu CEP">
        </div>

        <div class="campo">
            <label for="rua">Rua</label>
            <input type="text" id="rua" placeholder="Digite seu rua">
        </div>

        <div class="campo">
            <label for="local">Local</label>
            <input type="text" id="local" placeholder="Digite seu local">
        </div>

        <div class="campo">
            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" placeholder="Digite seu bairro">
        </div>



        <button id="vtn" type="button">Enviar</button>
    </form>

    <script src="/26-05/assets/scripts/form.js"></script>

</body>
